    <title>Collection Carddass Pocket Monster</title>
    <style>
        body {
            background-color: #1a1a1a; 
            margin: 0;
            padding: 40px;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
        }

        h1 {
            text-align: center;
            font-weight: 300;
            margin-bottom: 50px;
            letter-spacing: 3px;
            color: #f0f0f0;
            text-transform: uppercase;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(6, 1fr); 
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .gallery img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            cursor: pointer;
            display: block;
            background-color: #2a2a2a;
        }

        .gallery img:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 25px rgba(0,0,0,0.9);
            z-index: 10;
        }

        @media (max-width: 1100px) {
            .gallery { grid-template-columns: repeat(3, 1fr); }
            body { padding: 20px; }
        }

        @media (max-width: 600px) {
            .gallery { 
                grid-template-columns: repeat(2, 1fr); 
                gap: 12px;
            }
            h1 { font-size: 1.2rem; margin-bottom: 30px; }
        }
    </style>
</head>
