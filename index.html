<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Collection Carddass</title>
    <style>
        body {
            background-color: #1a1a1a; 
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            position: sticky;
            top: 0;
            background: #1a1a1a;
            padding: 10px;
            z-index: 100;
            border-bottom: 1px solid #333;
        }

        .stats {
            font-size: 1.2rem;
            color: #4caf50;
            margin-top: 10px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(6, 1fr); 
            gap: 15px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Conteneur de la carte pour gérer le filtre */
        .card-container {
            position: relative;
            cursor: pointer;
            transition: transform 0.2s;
            border-radius: 8px;
            overflow: hidden;
        }

        .card-container:hover {
            transform: scale(1.05);
            z-index: 10;
        }

        .card-container img {
            width: 100%;
            height: auto;
            display: block;
            transition: filter 0.3s ease;
        }

        /* FILTRE ROUGE (Par défaut) */
        .card-container.missing img {
            filter: sepia(1) hue-rotate(-50deg) saturate(2) brightness(0.7);
        }

        /* FILTRE VERT (Quand coché) */
        .card-container.owned img {
            filter: sepia(1) hue-rotate(70deg) saturate(2) brightness(0.9);
        }

        /* Badge de check */
        .check-badge {
            position: absolute;
            top: 5px;
            right: 5px;
            background: white;
            color: green;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .owned .check-badge {
            opacity: 1;
        }

        @media (max-width: 1100px) { .gallery { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 600px) { .gallery { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<header>
    <h1>Ma Collection Carddass</h1>
    <div class="stats" id="counter">Possédées : 0 / 151</div>
</header>

<div class="gallery" id="gallery">
    </div>

<script>
    const totalCards = 151;
    const gallery = document.getElementById('gallery');
    const counter = document.getElementById('counter');

    // Charger la collection depuis la mémoire du navigateur
    let ownedCards = JSON.parse(localStorage.getItem('myPokemonCollection')) || [];

    function updateStats() {
        counter.innerText = `Possédées : ${ownedCards.length} / ${totalCards}`;
    }

    function toggleCard(id) {
        if (ownedCards.includes(id)) {
            ownedCards = ownedCards.filter(cardId => cardId !== id);
        } else {
            ownedCards.push(id);
        }
        localStorage.setItem('myPokemonCollection', JSON.stringify(ownedCards));
        renderGallery();
    }

    function renderGallery() {
        gallery.innerHTML = '';
        for (let i = 1; i <= totalCards; i++) {
            const cardId = `carte_${String(i).padStart(3, '0')}`;
            const isOwned = ownedCards.includes(cardId);
            
            const container = document.createElement('div');
            container.className = `card-container ${isOwned ? 'owned' : 'missing'}`;
            container.onclick = () => toggleCard(cardId);

            container.innerHTML = `
                <img src="images/${cardId}.jpg" alt="Carte ${i}">
                <div class="check-badge">✓</div>
            `;
            
            gallery.appendChild(container);
        }
        updateStats();
    }

    // Initialisation
    renderGallery();
</script>

</body>
</html>
